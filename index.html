<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Universal AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        .glass-effect { backdrop-filter: blur(8px); background: rgba(255, 255, 255, 0.8); }
        .dark .glass-effect { background: rgba(31, 41, 55, 0.8); }
        #chat-container::-webkit-scrollbar { width: 6px; }
        #chat-container::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .dark #chat-container::-webkit-scrollbar-thumb { background: #374151; }
        pre { background: #f3f4f6; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 0.5rem 0; }
        .dark pre { background: #1f2937; color: #e5e7eb; }
        code { font-family: 'Courier New', Courier, monospace; }
        .typing-cursor::after { content: '|'; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        /* Prevent layout shift on mobile keyboard */
        html, body { height: 100%; overflow: hidden; }
        #app-root { display: flex; height: 100%; width: 100%; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 transition-colors duration-200">

    <div id="loading" class="fixed inset-0 z-[100] flex items-center justify-center bg-white dark:bg-gray-900">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
            <p class="mt-4 text-sm font-medium text-gray-500">Initializing Gemini Clone...</p>
        </div>
    </div>

    <div id="app-root" class="hidden">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full lg:translate-x-0 sidebar-transition flex flex-col">
            <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <button onclick="createNewChat()" class="flex items-center justify-center gap-2 w-full py-2 px-4 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 rounded-full transition-all text-sm font-medium">
                    <span>+</span> New Chat
                </button>
                <button onclick="toggleSidebar()" class="lg:hidden ml-2 p-2">✕</button>
            </div>
            
            <div id="chat-list" class="flex-1 overflow-y-auto p-3 space-y-2">
                </div>

            <div class="p-4 border-t border-gray-200 dark:border-gray-700 space-y-2">
                <button onclick="toggleSettings()" class="flex items-center gap-3 w-full p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg text-sm">
                    ⚙️ Settings
                </button>
                <button onclick="toggleDarkMode()" class="flex items-center gap-3 w-full p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg text-sm">
                    <span id="dark-mode-icon">🌙</span> <span id="dark-mode-text">Dark Mode</span>
                </button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 lg:ml-72 relative h-full">
            <header class="h-14 flex items-center justify-between px-4 border-b border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 lg:bg-transparent">
                <button onclick="toggleSidebar()" class="lg:hidden p-2 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-md">
                    ☰
                </button>
                <h1 id="current-chat-title" class="text-sm font-semibold truncate px-4">New Conversation</h1>
                <div class="w-10"></div> </header>

            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-6 pb-32">
                <div id="welcome-screen" class="max-w-2xl mx-auto mt-20 text-center">
                    <h2 class="text-4xl font-bold bg-gradient-to-r from-blue-600 to-purple-500 bg-clip-text text-transparent mb-4">Hello, how can I help?</h2>
                    <p class="text-gray-500 dark:text-gray-400">Ask anything, from coding questions to creative writing.</p>
                </div>
            </div>

            <div class="absolute bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-gray-50 dark:from-gray-900 via-gray-50 dark:via-gray-900 to-transparent">
                <div class="max-w-3xl mx-auto relative">
                    <textarea id="user-input" rows="1" 
                        class="w-full p-4 pr-12 rounded-2xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none shadow-lg text-sm"
                        placeholder="Type your message here..."
                        oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                    <button id="send-btn" onclick="handleSendMessage()" 
                        class="absolute right-3 bottom-3 p-2 text-blue-600 hover:bg-blue-50 dark:hover:bg-gray-700 rounded-full transition-colors">
                        <svg viewBox="0 0 24 24" class="w-6 h-6 fill-current"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                </div>
                <p class="text-[10px] text-center mt-2 text-gray-400">Universal AI may provide inaccurate info. Check your API settings.</p>
            </div>
        </main>

        <div id="settings-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-black/50">
            <div class="bg-white dark:bg-gray-800 rounded-2xl w-full max-w-md p-6 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">Settings</h3>
                    <button onclick="toggleSettings()" class="text-gray-500 hover:text-gray-700">✕</button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">OpenRouter API Key</label>
                        <input type="password" id="api-key-input" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600" placeholder="sk-or-v1-...">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">Model ID</label>
                        <input type="text" id="model-input" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600" placeholder="deepseek/deepseek-r1:free">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-gray-500 mb-1">System Prompt</label>
                        <textarea id="system-prompt-input" rows="3" class="w-full p-2 border rounded dark:bg-gray-700 dark:border-gray-600 text-sm" placeholder="You are a helpful assistant..."></textarea>
                    </div>
                </div>

                <div class="mt-8 flex gap-3">
                    <button onclick="saveSettings()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition-colors">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State Management
        let state = {
            apiKey: localStorage.getItem('ai_api_key') || '',
            model: localStorage.getItem('ai_model') || 'deepseek/deepseek-r1:free',
            systemPrompt: localStorage.getItem('ai_system_prompt') || 'You are a helpful AI assistant.',
            chats: JSON.parse(localStorage.getItem('ai_chats')) || [],
            currentChatId: null,
            isDarkMode: localStorage.getItem('ai_dark_mode') === 'true',
            isSidebarOpen: false
        };

        // DOM Elements
        const chatContainer = document.getElementById('chat-container');
        const chatList = document.getElementById('chat-list');
        const userInput = document.getElementById('user-input');
        const appRoot = document.getElementById('app-root');
        const loader = document.getElementById('loading');

        // Initialization
        window.onload = () => {
            if (state.isDarkMode) document.documentElement.classList.add('dark');
            renderChatList();
            updateDarkModeUI();
            
            // Auto-hide loader
            loader.classList.add('hidden');
            appRoot.classList.remove('hidden');

            // Handle Enter key (Shift+Enter for newline)
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            });
        };

        // --- Core Functions ---

        function createNewChat() {
            const newChat = {
                id: Date.now().toString(),
                title: 'New Conversation',
                messages: [],
                timestamp: new Date().toISOString()
            };
            state.chats.unshift(newChat);
            state.currentChatId = newChat.id;
            saveState();
            renderChatList();
            renderMessages();
            if (window.innerWidth < 1024) toggleSidebar();
        }

        async function handleSendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            if (!state.apiKey) {
                alert('Please enter your OpenRouter API Key in settings.');
                toggleSettings();
                return;
            }

            if (!state.currentChatId) {
                createNewChat();
            }

            const currentChat = state.chats.find(c => c.id === state.currentChatId);
            
            // Add user message
            currentChat.messages.push({ role: 'user', content: text });
            if (currentChat.title === 'New Conversation') currentChat.title = text.substring(0, 30) + '...';
            
            userInput.value = '';
            userInput.style.height = '';
            renderMessages();
            
            // Prepare AI message placeholder
            const aiMessageId = 'ai-' + Date.now();
            currentChat.messages.push({ role: 'assistant', content: '', id: aiMessageId });
            renderMessages();

            try {
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${state.apiKey}`,
                        'HTTP-Referer': window.location.href,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: state.model,
                        messages: [
                            { role: 'system', content: state.systemPrompt },
                            ...currentChat.messages.slice(0, -1).map(m => ({ role: m.role, content: m.content }))
                        ],
                        stream: true
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim() !== '');
                    
                    for (const line of lines) {
                        const message = line.replace(/^data: /, '');
                        if (message === '[DONE]') break;
                        try {
                            const parsed = JSON.parse(message);
                            const content = parsed.choices[0]?.delta?.content || '';
                            fullContent += content;
                            
                            // Update UI in real-time
                            const msgObj = currentChat.messages.find(m => m.id === aiMessageId);
                            msgObj.content = fullContent;
                            updateStreamingUI(aiMessageId, fullContent);
                        } catch (e) { /* silent parse error */ }
                    }
                }
                saveState();
                renderChatList();
            } catch (err) {
                console.error(err);
                const msgObj = currentChat.messages.find(m => m.id === aiMessageId);
                msgObj.content = "Error: Could not connect to API. Please check your key and network.";
                renderMessages();
            }
        }

        // --- UI Rendering ---

        function renderMessages() {
            const currentChat = state.chats.find(c => c.id === state.currentChatId);
            if (!currentChat || currentChat.messages.length === 0) {
                document.getElementById('welcome-screen').classList.remove('hidden');
                chatContainer.innerHTML = '';
                document.getElementById('current-chat-title').innerText = "New Conversation";
                return;
            }

            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('current-chat-title').innerText = currentChat.title;
            
            chatContainer.innerHTML = currentChat.messages.map(msg => `
                <div class="flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} animate-fadeIn">
                    <div class="max-w-[85%] md:max-w-[70%] rounded-2xl px-4 py-3 ${
                        msg.role === 'user' 
                        ? 'bg-blue-600 text-white rounded-br-none' 
                        : 'bg-white dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-bl-none shadow-sm'
                    }">
                        <div id="${msg.id || ''}" class="prose prose-sm dark:prose-invert max-w-none">
                            ${marked.parse(msg.content || (msg.role === 'assistant' ? '...' : ''))}
                        </div>
                    </div>
                </div>
            `).join('');
            
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function updateStreamingUI(id, content) {
            const el = document.getElementById(id);
            if (el) {
                el.innerHTML = marked.parse(content) + '<span class="typing-cursor"></span>';
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        function renderChatList() {
            chatList.innerHTML = state.chats.map(chat => `
                <div onclick="switchChat('${chat.id}')" class="group relative flex items-center p-3 rounded-xl cursor-pointer transition-all ${state.currentChatId === chat.id ? 'bg-blue-50 dark:bg-blue-900/20 text-blue-600' : 'hover:bg-gray-100 dark:hover:bg-gray-700'}">
                    <span class="truncate text-sm flex-1">${chat.title}</span>
                    <button onclick="event.stopPropagation(); deleteChat('${chat.id}')" class="opacity-0 group-hover:opacity-100 p-1 hover:text-red-500">
                        🗑️
                    </button>
                </div>
            `).join('');
        }

        // --- Interaction Logic ---

        function switchChat(id) {
            state.currentChatId = id;
            renderMessages();
            renderChatList();
            if (window.innerWidth < 1024) toggleSidebar();
        }

        function deleteChat(id) {
            state.chats = state.chats.filter(c => c.id !== id);
            if (state.currentChatId === id) state.currentChatId = null;
            saveState();
            renderChatList();
            renderMessages();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            state.isSidebarOpen = !state.isSidebarOpen;
            sidebar.style.transform = state.isSidebarOpen ? 'translateX(0)' : 'translateX(-100%)';
        }

        function toggleSettings() {
            const modal = document.getElementById('settings-modal');
            document.getElementById('api-key-input').value = state.apiKey;
            document.getElementById('model-input').value = state.model;
            document.getElementById('system-prompt-input').value = state.systemPrompt;
            modal.classList.toggle('hidden');
        }

        function saveSettings() {
            state.apiKey = document.getElementById('api-key-input').value.trim();
            state.model = document.getElementById('model-input').value.trim() || 'deepseek/deepseek-r1:free';
            state.systemPrompt = document.getElementById('system-prompt-input').value.trim();
            saveState();
            toggleSettings();
        }

        function toggleDarkMode() {
            state.isDarkMode = !state.isDarkMode;
            document.documentElement.classList.toggle('dark');
            saveState();
            updateDarkModeUI();
        }

        function updateDarkModeUI() {
            document.getElementById('dark-mode-icon').innerText = state.isDarkMode ? '☀️' : '🌙';
            document.getElementById('dark-mode-text').innerText = state.isDarkMode ? 'Light Mode' : 'Dark Mode';
        }

        function saveState() {
            localStorage.setItem('ai_api_key', state.apiKey);
            localStorage.setItem('ai_model', state.model);
            localStorage.setItem('ai_system_prompt', state.systemPrompt);
            localStorage.setItem('ai_chats', JSON.stringify(state.chats));
            localStorage.setItem('ai_dark_mode', state.isDarkMode);
        }
    </script>
</body>
</html>
